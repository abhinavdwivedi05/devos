version: '3.8'

services:
  # Next.js App Router Client
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      - backend

  # Spring Boot REST API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/devos
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=devossecret
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      - postgres
      - redis

  # PostgreSQL Relational Store
  postgres:
    image: postgres:15-alpine
    container_name: devos_postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=devos
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=devossecret
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Redis Cache Coordinator
  redis:
    image: redis:7-alpine
    container_name: devos_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
